<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FinanceMe">
<meta name="theme-color" content="#1A1A2E">
<title>FinanceMe</title>
<link rel="manifest" href="#" id="manifest-link">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#1A1A2E;--ink2:#2D2D44;
  --mint:#1DB87A;--mint-light:#E6F7F0;--mint-dark:#0F6E56;
  --coral:#F05A28;--coral-light:#FEF0EB;
  --violet:#6C5CE7;--violet-light:#EEF0FF;
  --amber:#F5A623;--amber-light:#FFF8E6;
  --bg:#F7F8FA;--white:#FFFFFF;
  --t1:#1A1A2E;--t2:#6B7280;--t3:#9CA3AF;
  --border:#E5E7EB;
  --r-sm:10px;--r-md:16px;--r-lg:24px;--r-pill:99px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);}

/* ── LOCK SCREEN ── */
#lock-screen{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;gap:0;}
.lock-logo{font-size:52px;margin-bottom:12px;}
.lock-title{font-size:26px;font-weight:700;color:#fff;letter-spacing:-0.5px;}
.lock-subtitle{font-size:14px;color:rgba(255,255,255,0.5);margin-top:6px;margin-bottom:40px;}
.pin-dots{display:flex;gap:14px;margin-bottom:12px;}
.pin-dot{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,0.2);transition:background .15s;}
.pin-dot.filled{background:var(--mint);}
.pin-error{font-size:13px;color:var(--coral);min-height:18px;margin-bottom:8px;}
.keypad{display:grid;grid-template-columns:repeat(3,80px);gap:14px;margin-top:24px;}
.key-btn{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;color:#fff;font-size:22px;font-weight:300;font-family:'Inter',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s;}
.key-btn:active{background:rgba(255,255,255,0.18);}
.key-btn.del{font-size:18px;background:transparent;}
.key-btn.empty{background:transparent;pointer-events:none;}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;height:100%;height:100dvh;}
#app.visible{display:flex;}

/* ── SCREENS ── */
.screen{display:none;flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(80px + var(--safe-bottom));}
.screen.active{display:block;}
.screen-scroll{padding:0 16px 20px;}

/* ── HEADER HERO ── */
.hero{background:var(--ink);border-radius:0 0 28px 28px;padding:calc(var(--safe-top) + 12px) 20px 20px;color:#fff;}
.hero-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.hero-greeting{font-size:13px;color:rgba(255,255,255,0.55);}
.hero-month{font-size:14px;font-weight:600;color:rgba(255,255,255,0.85);}
.hero-avatar{width:36px;height:36px;border-radius:50%;background:var(--mint);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;}
.hero-balance-label{font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:4px;}
.hero-balance{font-size:32px;font-weight:700;color:#fff;letter-spacing:-1px;}
.hero-accounts{display:flex;gap:8px;margin-top:14px;overflow-x:auto;padding-bottom:2px;}
.hero-accounts::-webkit-scrollbar{display:none;}
.account-pill{flex-shrink:0;background:rgba(255,255,255,0.1);border-radius:10px;padding:8px 12px;}
.account-pill-label{font-size:9px;color:rgba(255,255,255,0.45);margin-bottom:2px;}
.account-pill-value{font-size:13px;font-weight:600;color:#fff;}

/* ── CARDS ── */
.card{background:var(--white);border-radius:var(--r-md);border:0.5px solid var(--border);padding:16px;}
.card+.card{margin-top:10px;}
.section-title{font-size:14px;font-weight:600;color:var(--t1);margin:16px 0 10px;}

/* ── STAT ROW ── */
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.stat-card{background:var(--white);border-radius:var(--r-md);border:0.5px solid var(--border);padding:14px;}
.stat-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:10px;}
.stat-value{font-size:17px;font-weight:700;color:var(--t1);letter-spacing:-0.3px;}
.stat-label{font-size:10px;color:var(--t3);margin-top:2px;}

/* ── SAVINGS CARD ── */
.savings-card{background:var(--ink);border-radius:var(--r-md);padding:16px;margin-bottom:10px;}
.savings-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.savings-label{font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:3px;}
.savings-value{font-size:20px;font-weight:700;color:#fff;letter-spacing:-0.3px;}
.savings-badge{background:var(--mint);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:var(--r-pill);}
.progress-bg{height:6px;background:rgba(255,255,255,0.1);border-radius:var(--r-pill);overflow:hidden;margin-bottom:6px;}
.progress-fill{height:100%;background:var(--mint);border-radius:var(--r-pill);transition:width .4s ease;}
.savings-sub{font-size:10px;color:rgba(255,255,255,0.35);}

/* ── BUDGET ROW ── */
.budget-row{margin-bottom:8px;}
.budget-row:last-child{margin-bottom:0;}
.budget-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.budget-name{font-size:13px;font-weight:500;color:var(--t1);display:flex;align-items:center;gap:6px;}
.budget-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.budget-amounts{font-size:12px;color:var(--t2);}
.budget-amounts strong{color:var(--t1);}
.bar-bg{height:5px;background:var(--bg);border-radius:var(--r-pill);overflow:hidden;}
.bar-fill{height:100%;border-radius:var(--r-pill);transition:width .4s ease;}

/* ── ALERT BANNER ── */
.alert-banner{border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.alert-banner.amber{background:var(--amber-light);border:0.5px solid rgba(245,166,35,0.4);}
.alert-banner.red{background:var(--coral-light);border:0.5px solid rgba(240,90,40,0.4);}
.alert-icon{font-size:15px;flex-shrink:0;}
.alert-text{font-size:11px;line-height:1.4;}
.alert-banner.amber .alert-text{color:#7A4F00;}
.alert-banner.red .alert-text{color:#7A2000;}

/* ── FIXED EXPENSE ROW ── */
.fixed-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);}
.fixed-row:last-child{border-bottom:none;padding-bottom:0;}
.fixed-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.fixed-info{flex:1;}
.fixed-name{font-size:13px;font-weight:500;color:var(--t1);}
.fixed-day{font-size:11px;color:var(--t3);}
.fixed-amount{font-size:13px;font-weight:600;color:var(--coral);}

/* ── TAB BAR ── */
#tab-bar{position:fixed;bottom:0;left:0;right:0;height:calc(64px + var(--safe-bottom));background:var(--white);border-top:0.5px solid var(--border);display:flex;align-items:flex-start;justify-content:space-around;padding-top:10px;padding-bottom:var(--safe-bottom);z-index:100;}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:0.35;transition:opacity .15s;flex:1;}
.tab-item.active{opacity:1;}
.tab-icon{font-size:22px;line-height:1;}
.tab-label{font-size:9px;font-weight:500;color:var(--t2);}
.tab-item.active .tab-icon,.tab-item.active .tab-label{color:var(--mint-dark);}
.fab-wrap{flex:1;display:flex;justify-content:center;}
.fab{width:52px;height:52px;border-radius:50%;background:var(--mint);border:none;color:#fff;font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(29,184,122,0.4);margin-top:-20px;transition:transform .1s;}
.fab:active{transform:scale(0.95);}

/* ── ADD TRANSACTION MODAL ── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:none;align-items:flex-end;}
#modal-overlay.open{display:flex;}
#modal-sheet{background:var(--white);border-radius:24px 24px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:0 0 calc(20px + var(--safe-bottom));}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:var(--r-pill);margin:10px auto 0;}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 0;}
.modal-title{font-size:16px;font-weight:700;color:var(--t1);}
.modal-close{font-size:22px;color:var(--t2);cursor:pointer;background:none;border:none;font-family:'Inter',sans-serif;}
.modal-body{padding:14px 16px 0;}

/* ── FORM ── */
.type-toggle{display:flex;border-radius:var(--r-sm);overflow:hidden;border:0.5px solid var(--border);margin-bottom:14px;}
.type-btn{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;border:none;background:var(--bg);color:var(--t2);cursor:pointer;transition:all .15s;}
.type-btn.active-expense{background:var(--coral);color:#fff;}
.type-btn.active-income{background:var(--mint);color:#fff;}
.form-label{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:5px;display:block;}
.form-group{margin-bottom:12px;}
.amount-field{display:flex;align-items:center;gap:6px;background:var(--bg);border-radius:var(--r-sm);padding:12px 14px;border:0.5px solid var(--border);}
.amount-prefix{font-size:22px;font-weight:700;}
.amount-input{flex:1;border:none;background:transparent;font-size:22px;font-weight:700;font-family:'Inter',sans-serif;color:inherit;outline:none;width:100%;}
.amount-input::placeholder{color:var(--t3);}
.text-input{width:100%;border:0.5px solid var(--border);border-radius:var(--r-sm);padding:11px 14px;font-size:14px;font-family:'Inter',sans-serif;color:var(--t1);background:var(--bg);outline:none;}
.text-input:focus{border-color:var(--mint);}
.select-input{width:100%;border:0.5px solid var(--border);border-radius:var(--r-sm);padding:11px 14px;font-size:14px;font-family:'Inter',sans-serif;color:var(--t1);background:var(--bg);outline:none;appearance:none;-webkit-appearance:none;}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.cat-chip{border:0.5px solid var(--border);border-radius:var(--r-sm);padding:10px 4px;text-align:center;cursor:pointer;background:var(--bg);transition:all .15s;}
.cat-chip.selected{border-color:currentColor;}
.cat-chip-icon{font-size:20px;display:block;margin-bottom:3px;}
.cat-chip-name{font-size:9px;color:var(--t2);display:block;}
.cat-chip.selected .cat-chip-name{font-weight:600;}
.save-btn{width:100%;padding:15px;border-radius:var(--r-md);border:none;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;color:#fff;cursor:pointer;margin-top:6px;transition:opacity .15s;}
.save-btn:active{opacity:.85;}

/* ── TRANSACTIONS LIST ── */
.tx-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);}
.tx-row:last-child{border-bottom:none;}
.tx-icon-wrap{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.tx-info{flex:1;min-width:0;}
.tx-name{font-size:13px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-size:11px;color:var(--t3);}
.tx-amount{font-size:13px;font-weight:700;flex-shrink:0;}
.tx-amount.expense{color:var(--coral);}
.tx-amount.income{color:var(--mint-dark);}
.group-label{font-size:11px;font-weight:600;color:var(--t3);padding:12px 0 4px;}

/* ── FILTER CHIPS ── */
.filter-scroll{display:flex;gap:8px;overflow-x:auto;padding:10px 16px;background:var(--white);border-bottom:0.5px solid var(--border);}
.filter-scroll::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;padding:6px 14px;border-radius:var(--r-pill);font-size:12px;font-weight:500;border:0.5px solid var(--border);background:var(--white);color:var(--t2);cursor:pointer;}
.filter-chip.active{background:var(--ink);color:#fff;border-color:var(--ink);}

/* ── MONTH NAV ── */
.month-nav{display:flex;align-items:center;justify-content:center;gap:20px;padding:12px;background:var(--white);border-bottom:0.5px solid var(--border);}
.month-nav button{background:none;border:none;font-size:18px;cursor:pointer;color:var(--t1);font-weight:600;padding:4px 8px;}
.month-nav span{font-size:14px;font-weight:600;color:var(--t1);min-width:130px;text-align:center;}

/* ── ANALYSIS ── */
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;}
.mini-stat{background:var(--white);border-radius:var(--r-md);border:0.5px solid var(--border);padding:12px;}
.mini-stat-label{font-size:10px;color:var(--t3);margin-bottom:4px;}
.mini-stat-value{font-size:13px;font-weight:700;letter-spacing:-0.2px;}
.chart-wrap{position:relative;display:flex;align-items:center;gap:20px;}
svg.donut{overflow:visible;}
.legend{flex:1;}
.legend-item{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.legend-name{font-size:11px;color:var(--t2);flex:1;}
.legend-pct{font-size:11px;font-weight:700;color:var(--t1);}
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:100px;margin-top:12px;}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end;}
.bar-rect{width:100%;border-radius:5px 5px 0 0;transition:height .4s ease;}
.bar-month{font-size:9px;color:var(--t3);}
.shared-card{background:var(--ink);border-radius:var(--r-md);padding:16px;margin-bottom:10px;}
.shared-title{font-size:13px;font-weight:600;color:#fff;margin-bottom:12px;}
.shared-row{display:flex;justify-content:space-between;}
.shared-col-label{font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:3px;}
.shared-col-value{font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.3px;}
.split-bar{display:flex;gap:3px;height:8px;border-radius:4px;overflow:hidden;margin:12px 0 8px;}
.split-mine{background:var(--mint);}
.split-partner{background:var(--violet);}
.shared-footer{font-size:10px;color:rgba(255,255,255,0.35);}

/* ── SETTINGS ── */
.settings-section{margin-bottom:16px;}
.settings-group{background:var(--white);border-radius:var(--r-md);border:0.5px solid var(--border);overflow:hidden;}
.settings-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:0.5px solid var(--border);}
.settings-row:last-child{border-bottom:none;}
.settings-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.settings-label{font-size:14px;color:var(--t1);flex:1;}
.settings-input{border:none;background:transparent;font-size:14px;font-family:'Inter',sans-serif;color:var(--t2);text-align:right;outline:none;max-width:130px;}
.settings-value{font-size:14px;color:var(--t2);}
.settings-section-title{font-size:12px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;padding:0 4px;}
.danger-btn{width:100%;padding:14px;border-radius:var(--r-md);border:0.5px solid var(--coral);background:transparent;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;color:var(--coral);cursor:pointer;}

/* ── PROFILE HEADER ── */
.profile-header{display:flex;align-items:center;gap:14px;background:var(--white);border-radius:var(--r-md);border:0.5px solid var(--border);padding:16px;margin-bottom:16px;}
.profile-avatar{width:52px;height:52px;border-radius:50%;background:var(--mint);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;}
.profile-name{font-size:16px;font-weight:700;color:var(--t1);}
.profile-sub{font-size:12px;color:var(--t3);}

/* ── SWIPE DELETE ── */
.tx-item-wrap{position:relative;overflow:hidden;}
.tx-delete-bg{position:absolute;right:0;top:0;bottom:0;width:80px;background:var(--coral);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;border-radius:0 10px 10px 0;}

/* ── EMPTY STATE ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 16px;gap:12px;}
.empty-icon{font-size:40px;opacity:.4;}
.empty-title{font-size:16px;font-weight:600;color:var(--t2);}
.empty-sub{font-size:13px;color:var(--t3);text-align:center;}

@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.shake{animation:shake 0.4s ease;}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <div class="lock-logo">💰</div>
  <div class="lock-title">FinanceMe</div>
  <div class="lock-subtitle" id="lock-subtitle">Crea il tuo PIN</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <div class="keypad">
    <button class="key-btn" onclick="keyPress('1')">1</button>
    <button class="key-btn" onclick="keyPress('2')">2</button>
    <button class="key-btn" onclick="keyPress('3')">3</button>
    <button class="key-btn" onclick="keyPress('4')">4</button>
    <button class="key-btn" onclick="keyPress('5')">5</button>
    <button class="key-btn" onclick="keyPress('6')">6</button>
    <button class="key-btn" onclick="keyPress('7')">7</button>
    <button class="key-btn" onclick="keyPress('8')">8</button>
    <button class="key-btn" onclick="keyPress('9')">9</button>
    <button class="key-btn empty"></button>
    <button class="key-btn" onclick="keyPress('0')">0</button>
    <button class="key-btn del" onclick="keyDel()">⌫</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- DASHBOARD -->
  <div class="screen active" id="screen-home">
    <div class="hero">
      <div class="hero-top">
        <div>
          <div class="hero-greeting" id="hero-greeting">Buongiorno</div>
          <div class="hero-month" id="hero-month"></div>
        </div>
        <div class="hero-avatar" id="hero-avatar">GC</div>
      </div>
      <div class="hero-balance-label">Patrimonio totale</div>
      <div class="hero-balance" id="hero-balance">€ 0,00</div>
      <div class="hero-accounts" id="hero-accounts"></div>
    </div>
    <div class="screen-scroll" id="dashboard-content"></div>
  </div>

  <!-- MOVIMENTI -->
  <div class="screen" id="screen-movimenti">
    <div class="month-nav">
      <button onclick="changeMonth(-1)">‹</button>
      <span id="mov-month-label"></span>
      <button onclick="changeMonth(1)">›</button>
    </div>
    <div class="filter-scroll" id="filter-row"></div>
    <div class="screen-scroll" id="tx-list-content"></div>
  </div>

  <!-- ANALISI -->
  <div class="screen" id="screen-analisi">
    <div class="screen-scroll" id="analysis-content"></div>
  </div>

  <!-- IMPOSTAZIONI -->
  <div class="screen" id="screen-settings">
    <div class="screen-scroll" id="settings-content"></div>
  </div>

  <!-- TAB BAR -->
  <div id="tab-bar">
    <div class="tab-item active" onclick="switchTab('home')" id="tab-home">
      <div class="tab-icon">🏠</div>
      <div class="tab-label">Home</div>
    </div>
    <div class="tab-item" onclick="switchTab('movimenti')" id="tab-movimenti">
      <div class="tab-icon">↔️</div>
      <div class="tab-label">Movimenti</div>
    </div>
    <div class="fab-wrap">
      <button class="fab" onclick="openModal()">+</button>
    </div>
    <div class="tab-item" onclick="switchTab('analisi')" id="tab-analisi">
      <div class="tab-icon">📊</div>
      <div class="tab-label">Analisi</div>
    </div>
    <div class="tab-item" onclick="switchTab('settings')" id="tab-settings">
      <div class="tab-icon">⚙️</div>
      <div class="tab-label">Impostazioni</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
// DATA LAYER
// ═══════════════════════════════════════════
const STORE = {
  get(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

const CATS = [
  {id:'alimentari',name:'Alimentari',icon:'🛒',color:'#1DB87A'},
  {id:'ristoranti',name:'Ristoranti',icon:'🍽️',color:'#F05A28'},
  {id:'trasporti',name:'Trasporti',icon:'🚗',color:'#6C5CE7'},
  {id:'svago',name:'Svago',icon:'🎬',color:'#F5A623'},
  {id:'salute',name:'Salute',icon:'❤️',color:'#E91E8C'},
  {id:'abbigliamento',name:'Abbigliamento',icon:'👕',color:'#00BCD4'},
  {id:'casa',name:'Casa',icon:'🏠',color:'#FF9800'},
  {id:'abbonamenti',name:'Abbonamenti',icon:'🔄',color:'#9C27B0'},
  {id:'altro',name:'Altro',icon:'•••',color:'#9CA3AF'}
];

function getCat(id){return CATS.find(c=>c.id===id)||CATS[8];}

function getData(){
  const settings = STORE.get('settings',{
    userName:'Greta',
    salary:1500,
    savingsTarget:300,
    minBalance:500,
    splitMine:500,
    splitPartner:850,
    partnerName:'Partner'
  });
  const accounts = STORE.get('accounts',[
    {id:'personal',name:'Conto Personale',type:'personal',balance:1000,color:'#1DB87A'},
    {id:'shared',name:'Conto Condiviso',type:'shared',balance:1350,color:'#6C5CE7'},
    {id:'savings',name:'Risparmio',type:'savings',balance:0,color:'#F5A623'}
  ]);
  const transactions = STORE.get('transactions',[]);
  const budgets = STORE.get('budgets',{
    alimentari:250,ristoranti:150,trasporti:150,svago:200,
    salute:100,abbigliamento:100,casa:100,abbonamenti:100,altro:100
  });
  const fixed = STORE.get('fixed',[
    {id:'f1',name:'Versamento conto condiviso',amount:500,day:1,catId:'casa'},
    {id:'f2',name:'Risparmio mensile',amount:300,day:1,catId:'altro'},
    {id:'f3',name:'Affitto',amount:600,day:5,catId:'casa'},
    {id:'f4',name:'Netflix',amount:18,day:15,catId:'abbonamenti'}
  ]);
  return {settings,accounts,transactions,budgets,fixed};
}

function saveData(key,val){STORE.set(key,val);}

function eur(n){
  const abs=Math.abs(n);
  const s=abs.toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});
  return '€ '+s;
}

function totalBalance(accounts){return accounts.reduce((s,a)=>s+a.balance,0);}

function txForMonth(transactions,date){
  return transactions.filter(t=>{
    const d=new Date(t.date);
    return d.getFullYear()===date.getFullYear()&&d.getMonth()===date.getMonth();
  });
}

function totalSpent(transactions,date){
  return txForMonth(transactions,date).filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
}

function totalIncome(transactions,date){
  return txForMonth(transactions,date).filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
}

function catSpent(transactions,date){
  const map={};
  txForMonth(transactions,date).filter(t=>t.type==='expense').forEach(t=>{
    map[t.catId]=(map[t.catId]||0)+t.amount;
  });
  return map;
}

function fixedTotal(fixed){return fixed.filter(f=>f.active!==false).reduce((s,f)=>s+f.amount,0);}

function available(settings,fixed){return settings.salary-fixedTotal(fixed);}

function remaining(settings,fixed,transactions,date){
  return available(settings,fixed)-totalSpent(transactions,date);
}

function splitPct(s){
  const tot=s.splitMine+s.splitPartner;
  if(!tot)return{mine:50,partner:50};
  return{mine:Math.round(s.splitMine/tot*100),partner:Math.round(s.splitPartner/tot*100)};
}

function mySharedShare(transactions,accounts,settings,date){
  const shared=accounts.find(a=>a.type==='shared');
  if(!shared)return 0;
  const spent=txForMonth(transactions,date).filter(t=>t.accountId===shared.id&&t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const pct=splitPct(settings).mine/100;
  return spent*pct;
}

function monthLabel(date){
  return date.toLocaleDateString('it-IT',{month:'long',year:'numeric'}).replace(/^./,c=>c.toUpperCase());
}

function shortDate(date){
  const d=new Date(date);
  const now=new Date();
  const y=new Date(now);y.setDate(y.getDate()-1);
  if(d.toDateString()===now.toDateString())return'Oggi';
  if(d.toDateString()===y.toDateString())return'Ieri';
  return d.toLocaleDateString('it-IT',{day:'numeric',month:'short'});
}

function groupByDate(txs){
  const groups={};
  txs.forEach(t=>{
    const k=shortDate(t.date);
    if(!groups[k])groups[k]=[];
    groups[k].push(t);
  });
  return groups;
}

function daysUntilSalary(settings){
  const today=new Date().getDate();
  const day=settings.salaryDay||10;
  const now=new Date();
  if(today<=day)return day-today===0?'Stipendio previsto oggi':`Stipendio previsto in ${day-today} giorni`;
  const dInM=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  return`Stipendio previsto in ${dInM-today+day} giorni`;
}

function savingsThisMonth(transactions,date){
  return txForMonth(transactions,date)
    .filter(t=>t.type==='income'&&t.description&&t.description.toLowerCase().includes('risparmio'))
    .reduce((s,t)=>s+t.amount,0);
}

// ═══════════════════════════════════════════
// PIN
// ═══════════════════════════════════════════
let pinBuffer='';
let pinConfirm='';
let pinPhase='enter'; // 'create','confirm','enter'

function initPin(){
  const saved=localStorage.getItem('pin');
  pinPhase=saved?'enter':'create';
  document.getElementById('lock-subtitle').textContent=pinPhase==='create'?'Crea il tuo PIN':'Inserisci il PIN';
}

function keyPress(d){
  if(pinBuffer.length>=4)return;
  pinBuffer+=d;
  updateDots(pinBuffer.length);
  if(pinBuffer.length===4)setTimeout(handlePin,80);
}

function keyDel(){
  if(pinBuffer.length>0){pinBuffer=pinBuffer.slice(0,-1);updateDots(pinBuffer.length);}
}

function updateDots(n){
  for(let i=0;i<4;i++){
    document.getElementById('d'+i).classList.toggle('filled',i<n);
  }
}

function handlePin(){
  const saved=localStorage.getItem('pin');
  if(!saved){
    if(pinPhase==='create'){
      pinConfirm=pinBuffer;pinBuffer='';updateDots(0);
      pinPhase='confirm';
      document.getElementById('lock-subtitle').textContent='Conferma il PIN';
    } else if(pinPhase==='confirm'){
      if(pinBuffer===pinConfirm){
        localStorage.setItem('pin',pinBuffer);
        unlockApp();
      } else {
        showPinError('I PIN non corrispondono');
        pinBuffer='';pinConfirm='';pinPhase='create';
        document.getElementById('lock-subtitle').textContent='Crea il tuo PIN';
        updateDots(0);
      }
    }
  } else {
    if(pinBuffer===saved){unlockApp();}
    else{showPinError('PIN errato. Riprova.');pinBuffer='';updateDots(0);}
  }
}

function showPinError(msg){
  const el=document.getElementById('pin-error');
  el.textContent=msg;
  el.closest?null:null;
  const dots=document.querySelector('.pin-dots');
  dots.classList.add('shake');
  setTimeout(()=>dots.classList.remove('shake'),400);
  setTimeout(()=>el.textContent='',2000);
}

function unlockApp(){
  document.getElementById('lock-screen').style.display='none';
  document.getElementById('app').classList.add('visible');
  initApp();
}

// ═══════════════════════════════════════════
// APP INIT
// ═══════════════════════════════════════════
let currentTab='home';
let currentMonth=new Date();
currentMonth.setDate(1);
let txFilter='all';
let selectedCat='altro';
let txType='expense';

function initApp(){
  const {settings}=getData();
  const h=new Date().getHours();
  const greet=h<12?'Buongiorno':h<18?'Buon pomeriggio':'Buonasera';
  document.getElementById('hero-greeting').textContent=`${greet}, ${settings.userName} 👋`;
  document.getElementById('hero-month').textContent=monthLabel(new Date());
  document.getElementById('hero-avatar').textContent=settings.userName.slice(0,2).toUpperCase();

  buildDateInput();
  buildCatGrid();
  buildAccountSelect();
  renderDashboard();
  renderMovimenti();
  renderAnalysis();
  renderSettings();
}

function buildDateInput(){
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('date-input').value=today;
}

function buildCatGrid(){
  const grid=document.getElementById('cat-grid');
  grid.innerHTML=CATS.map(c=>`
    <div class="cat-chip${c.id===selectedCat?' selected':''}" 
         id="chip-${c.id}" 
         onclick="selectCat('${c.id}')"
         style="${c.id===selectedCat?`color:${c.color};background:${c.color}18;border-color:${c.color};`:''}">
      <span class="cat-chip-icon">${c.icon}</span>
      <span class="cat-chip-name">${c.name}</span>
    </div>`).join('');
}

function buildAccountSelect(){
  const {accounts}=getData();
  const sel=document.getElementById('account-select');
  sel.innerHTML=accounts.filter(a=>a.active!==false).map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
}

// ═══════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════
function renderDashboard(){
  const {settings,accounts,transactions,budgets,fixed}=getData();
  const now=new Date();

  // Hero
  document.getElementById('hero-balance').textContent=eur(totalBalance(accounts));
  document.getElementById('hero-avatar').textContent=settings.userName.slice(0,2).toUpperCase();

  // Account pills
  document.getElementById('hero-accounts').innerHTML=accounts.filter(a=>a.active!==false).map(a=>`
    <div class="account-pill">
      <div class="account-pill-label">${a.name}</div>
      <div class="account-pill-value">${eur(a.balance)}</div>
    </div>`).join('');

  // Content
  let html='';

  // Alerts
  const cs=catSpent(transactions,now);
  CATS.forEach(c=>{
    const spent=cs[c.id]||0;
    const limit=budgets[c.id]||0;
    if(limit>0&&spent/limit>=0.8){
      const pct=Math.round(spent/limit*100);
      html+=`<div class="alert-banner ${pct>=100?'red':'amber'}">
        <span class="alert-icon">⚠️</span>
        <span class="alert-text"><strong>${c.name}</strong> all'${pct}% del budget mensile</span>
      </div>`;
    }
  });
  const personal=accounts.find(a=>a.type==='personal');
  if(personal&&personal.balance<settings.minBalance){
    html+=`<div class="alert-banner red"><span class="alert-icon">⚠️</span>
      <span class="alert-text">Saldo sotto la soglia minima (${eur(settings.minBalance)})</span></div>`;
  }

  // Stat cards
  const spent=totalSpent(transactions,now);
  const rem=remaining(settings,fixed,transactions,now);
  html+=`<div class="stat-row">
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--coral-light)">💸</div>
      <div class="stat-value" style="color:var(--coral)">${eur(spent)}</div>
      <div class="stat-label">Speso questo mese</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:var(--mint-light)">💳</div>
      <div class="stat-value" style="color:var(--mint-dark)">${eur(rem)}</div>
      <div class="stat-label">Disponibile libero</div>
    </div>
  </div>`;

  // Savings card
  const target=settings.savingsTarget;
  const saved=savingsThisMonth(transactions,now);
  const pctSaved=target>0?Math.min(Math.round(saved/target*100),100):0;
  html+=`<div class="savings-card">
    <div class="savings-top">
      <div>
        <div class="savings-label">Risparmio mensile</div>
        <div class="savings-value">${eur(saved)} / ${eur(target)}</div>
      </div>
      <div class="savings-badge">${pctSaved}%</div>
    </div>
    <div class="progress-bg"><div class="progress-fill" style="width:${pctSaved}%"></div></div>
    <div class="savings-sub">${daysUntilSalary(settings)}</div>
  </div>`;

  // Budget
  html+=`<div class="section-title">Budget categorie</div>`;
  html+=`<div class="card">`;
  CATS.filter(c=>c.id!=='altro').forEach(c=>{
    const s=cs[c.id]||0;
    const lim=budgets[c.id]||0;
    const pct=lim>0?Math.min(Math.round(s/lim*100),100):0;
    const fillColor=pct>=100?'var(--coral)':pct>=80?'var(--amber)':c.color;
    html+=`<div class="budget-row">
      <div class="budget-header">
        <div class="budget-name"><div class="budget-dot" style="background:${c.color}"></div>${c.name}</div>
        <div class="budget-amounts"><strong>${eur(s)}</strong> / ${eur(lim)}</div>
      </div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${fillColor}"></div></div>
    </div>`;
  });
  html+=`</div>`;

  // Fixed expenses
  html+=`<div class="section-title">Uscite fisse</div><div class="card">`;
  fixed.filter(f=>f.active!==false).forEach(f=>{
    const cat=getCat(f.catId);
    html+=`<div class="fixed-row">
      <div class="fixed-icon" style="background:${cat.color}18">${cat.icon}</div>
      <div class="fixed-info">
        <div class="fixed-name">${f.name}</div>
        <div class="fixed-day">Giorno ${f.day} del mese</div>
      </div>
      <div class="fixed-amount">${eur(f.amount)}</div>
    </div>`;
  });
  html+=`</div>`;

  document.getElementById('dashboard-content').innerHTML=html;
}

// ═══════════════════════════════════════════
// MOVIMENTI
// ═══════════════════════════════════════════
function renderMovimenti(){
  const {transactions,accounts}=getData();
  document.getElementById('mov-month-label').textContent=monthLabel(currentMonth);

  // Filter chips
  const filters=[{id:'all',label:'Tutti'},{id:'expense',label:'Uscite'},{id:'income',label:'Entrate'},
    ...CATS.map(c=>({id:'cat_'+c.id,label:c.name,color:c.color}))];
  document.getElementById('filter-row').innerHTML=filters.map(f=>`
    <div class="filter-chip${txFilter===f.id?' active':''}" onclick="setFilter('${f.id}')">
      ${f.color?`<span style="color:${f.color}">● </span>`:''}${f.label}
    </div>`).join('');

  // Transactions
  let txs=txForMonth(transactions,currentMonth).sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(txFilter==='expense')txs=txs.filter(t=>t.type==='expense');
  else if(txFilter==='income')txs=txs.filter(t=>t.type==='income');
  else if(txFilter.startsWith('cat_')){const cid=txFilter.slice(4);txs=txs.filter(t=>t.catId===cid);}

  if(txs.length===0){
    document.getElementById('tx-list-content').innerHTML=`<div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-title">Nessuna transazione</div>
      <div class="empty-sub">Usa il + per aggiungere la prima</div>
    </div>`;
    return;
  }

  const groups=groupByDate(txs);
  let html='';
  Object.entries(groups).forEach(([label,items])=>{
    html+=`<div class="group-label">${label}</div>`;
    items.forEach(t=>{
      const cat=getCat(t.catId);
      const acc=accounts.find(a=>a.id===t.accountId);
      html+=`<div class="tx-row" data-id="${t.id}">
        <div class="tx-icon-wrap" style="background:${cat.color}18">${cat.icon}</div>
        <div class="tx-info">
          <div class="tx-name">${t.description||cat.name}</div>
          <div class="tx-meta">${cat.name}${acc?' · '+acc.name:''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="tx-amount ${t.type}">${t.type==='expense'?'-':'+'} ${eur(t.amount)}</div>
          <span onclick="deleteTransaction('${t.id}')" style="font-size:16px;color:var(--t3);cursor:pointer">🗑</span>
        </div>
      </div>`;
    });
  });
  document.getElementById('tx-list-content').innerHTML=html;
}

function changeMonth(d){
  currentMonth=new Date(currentMonth.getFullYear(),currentMonth.getMonth()+d,1);
  renderMovimenti();
}

function setFilter(f){txFilter=f;renderMovimenti();}

function deleteTransaction(id){
  if(!confirm('Eliminare questa transazione?'))return;
  const {transactions,accounts}=getData();
  const t=transactions.find(x=>x.id===id);
  if(!t)return;
  // Reverse balance
  const accs=accounts.map(a=>{
    if(a.id===t.accountId){
      return{...a,balance:a.balance+(t.type==='expense'?t.amount:-t.amount)};
    }
    return a;
  });
  STORE.set('transactions',transactions.filter(x=>x.id!==id));
  STORE.set('accounts',accs);
  renderMovimenti();
  renderDashboard();
  renderAnalysis();
}

// ═══════════════════════════════════════════
// ANALYSIS
// ═══════════════════════════════════════════
function renderAnalysis(){
  const {transactions,accounts,settings}=getData();
  const now=new Date();
  const cs=catSpent(transactions,now);
  const totalExp=totalSpent(transactions,now);
  const totalInc=totalIncome(transactions,now);
  const saldo=totalInc-totalExp;

  let html='';
  html+=`<div class="section-title">Riepilogo ${monthLabel(now)}</div>`;
  html+=`<div class="mini-stats">
    <div class="mini-stat"><div class="mini-stat-label">Entrate</div><div class="mini-stat-value" style="color:var(--mint-dark)">${eur(totalInc)}</div></div>
    <div class="mini-stat"><div class="mini-stat-label">Uscite</div><div class="mini-stat-value" style="color:var(--coral)">${eur(totalExp)}</div></div>
    <div class="mini-stat"><div class="mini-stat-label">Saldo</div><div class="mini-stat-value" style="color:var(--violet)">${eur(saldo)}</div></div>
  </div>`;

  // Donut
  html+=`<div class="card" style="margin-bottom:10px">
    <div class="section-title" style="margin-top:0">Distribuzione spese</div>`;
  const donutData=CATS.filter(c=>cs[c.id]>0).sort((a,b)=>(cs[b.id]||0)-(cs[a.id]||0));
  if(donutData.length===0){
    html+=`<div style="text-align:center;padding:20px;color:var(--t3);font-size:13px">Nessuna spesa questo mese</div>`;
  } else {
    const R=45,cx=60,cy=60;
    let offset=0;
    const total=donutData.reduce((s,c)=>s+(cs[c.id]||0),0);
    let sectors='';
    donutData.forEach(c=>{
      const val=cs[c.id]||0;
      const pct=val/total;
      const angle=pct*2*Math.PI;
      const x1=cx+R*Math.sin(offset);
      const y1=cy-R*Math.cos(offset);
      offset+=angle;
      const x2=cx+R*Math.sin(offset);
      const y2=cy-R*Math.cos(offset);
      const large=pct>0.5?1:0;
      sectors+=`<path d="M${cx},${cy} L${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} Z" fill="${c.color}" opacity="0.9"/>`;
    });
    const legend=donutData.slice(0,5).map(c=>`
      <div class="legend-item">
        <div class="legend-dot" style="background:${c.color}"></div>
        <span class="legend-name">${c.name}</span>
        <span class="legend-pct">${Math.round((cs[c.id]||0)/total*100)}%</span>
      </div>`).join('');
    html+=`<div class="chart-wrap">
      <svg class="donut" width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="45" fill="#f0f0f0"/>
        ${sectors}
        <circle cx="60" cy="60" r="28" fill="white"/>
        <text x="60" y="56" text-anchor="middle" font-size="11" font-weight="700" fill="#1A1A2E" font-family="Inter">${eur(total)}</text>
        <text x="60" y="69" text-anchor="middle" font-size="9" fill="#9CA3AF" font-family="Inter">totale</text>
      </svg>
      <div class="legend">${legend}</div>
    </div>`;
  }
  html+=`</div>`;

  // Bar chart 6 months
  const months6=[];
  for(let i=5;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    months6.push({date:d,label:d.toLocaleDateString('it-IT',{month:'short'}),spent:totalSpent(transactions,d)});
  }
  const maxSpent=Math.max(...months6.map(m=>m.spent),1);
  html+=`<div class="card" style="margin-bottom:10px">
    <div style="font-size:13px;font-weight:600;color:var(--t1)">Spese ultimi 6 mesi</div>
    <div class="bar-chart">
      ${months6.map(m=>{
        const h=Math.max(Math.round((m.spent/maxSpent)*80),2);
        const isCurrent=m.date.getMonth()===now.getMonth()&&m.date.getFullYear()===now.getFullYear();
        return`<div class="bar-col">
          <div class="bar-rect" style="height:${h}px;background:${isCurrent?'var(--mint)':'var(--border)'}"></div>
          <div class="bar-month" style="${isCurrent?'color:var(--mint-dark);font-weight:600':''}">${m.label}</div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  // Shared account
  const shared=accounts.find(a=>a.type==='shared');
  if(shared){
    const myShare=mySharedShare(transactions,accounts,settings,now);
    const sp=splitPct(settings);
    const partnerShare=myShare/sp.mine*sp.partner;
    html+=`<div class="shared-card">
      <div class="shared-title">Conto condiviso · Split ${sp.mine}% / ${sp.partner}%</div>
      <div class="shared-row">
        <div><div class="shared-col-label">Quota mia</div><div class="shared-col-value">${eur(myShare)}</div></div>
        <div style="text-align:right"><div class="shared-col-label">Quota ${settings.partnerName||'Partner'}</div><div class="shared-col-value">${eur(partnerShare)}</div></div>
      </div>
      <div class="split-bar">
        <div class="split-mine" style="flex:${sp.mine}"></div>
        <div class="split-partner" style="flex:${sp.partner}"></div>
      </div>
      <div class="shared-footer">Versamenti: ${eur(settings.splitMine)} tu · ${eur(settings.splitPartner)} ${settings.partnerName||'Partner'}</div>
    </div>`;
  }

  document.getElementById('analysis-content').innerHTML=html;
}

// ═══════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════
function renderSettings(){

  const sp=splitPct(settings);
  let html=`
  <div class="profile-header">
    <div class="profile-avatar">${settings.userName.slice(0,2).toUpperCase()}</div>
    <div><div class="profile-name">${settings.userName}</div><div class="profile-sub">Piano personale</div></div>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">Finanze</div>
    <div class="settings-group">
      <div class="settings-row">
        <div class="settings-icon" style="background:#e6f7f0">👤</div>
        <div class="settings-label">Nome</div>
        <input class="settings-input" value="${settings.userName}" onchange="updateSetting('userName',this.value)">
      </div>
      <div class="settings-row">
        <div class="settings-icon" style="background:#e6f7f0">💶</div>
        <div class="settings-label">Stipendio mensile</div>
        <input class="settings-input" type="number" value="${settings.salary}" onchange="updateSetting('salary',parseFloat(this.value))">
      </div>
      <div class="settings-row">
        <div class="settings-icon" style="background:#fff8e6">📅</div>
        <div class="settings-label">Giorno stipendio</div>
        <input class="settings-input" type="number" min="1" max="28" value="${settings.salaryDay||10}" onchange="updateSetting('salaryDay',parseInt(this.value))">
      </div>
      <div class="settings-row">
        <div class="settings-icon" style="background:#fff8e6">💰</div>
        <div class="settings-label">Risparmio mensile (€)</div>
        <input class="settings-input" type="number" value="${settings.savingsTarget}" onchange="updateSetting('savingsTarget',parseFloat(this.value))">
      </div>
      <div class="settings-row">
        <div class="settings-icon" style="background:#fef0eb">⚠️</div>
        <div class="settings-label">Saldo minimo alert (€)</div>
        <input class="settings-input" type="number" value="${settings.minBalance}" onchange="updateSetting('minBalance',parseFloat(this.value))">
      </div>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">Conto condiviso</div>
    <div class="settings-group">
      <div class="settings-row">
        <div class="settings-icon" style="background:#eef0ff">👥</div>
        <div class="settings-label">Nome partner</div>
        <input class="settings-input" value="${settings.partnerName||'Partner'}" onchange="updateSetting('partnerName',this.value)">
      </div>
      <div class="settings-row">
        <div class="settings-icon" style="background:#e6f7f0">💳</div>
        <div class="settings-label">Mia quota mensile (€)</div>
        <input class="settings-input" type="number" value="${settings.splitMine}" onchange="updateSetting('splitMine',parseFloat(this.value));renderSettings();">
      </div>
      <div class="settings-row">
        <div class="settings-icon" style="background:#eef0ff">💳</div>
        <div class="settings-label">Quota partner (€)</div>
        <input class="settings-input" type="number" value="${settings.splitPartner}" onchange="updateSetting('splitPartner',parseFloat(this.value));renderSettings();">
      </div>
      <div class="settings-row">
        <div class="settings-icon" style="background:var(--bg)">📊</div>
        <div class="settings-label">Split calcolato</div>
        <div class="settings-value">${sp.mine}% tu · ${sp.partner}% partner</div>
      </div>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">Budget categorie (€/mese)</div>
    <div class="settings-group">
      ${CATS.map(c=>`
      <div class="settings-row">
        <div class="settings-icon" style="background:${c.color}18">${c.icon}</div>
        <div class="settings-label">${c.name}</div>
        <input class="settings-input" type="number" value="${budgets[c.id]||0}" onchange="updateBudget('${c.id}',parseFloat(this.value))">
      </div>`).join('')}
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-section-title">Conti</div>
    <div class="settings-group">
      ${accounts.map(a=>`
      <div class="settings-row">
        <div class="settings-icon" style="background:${a.color}22">💼</div>
        <div class="settings-label">${a.name}</div>
        <input class="settings-input" type="number" step="0.01" value="${a.balance.toFixed(2)}" onchange="updateAccountBalance('${a.id}',parseFloat(this.value))">

  <div class="settings-section">
    <div class="settings-section-title">Sicurezza</div>
    <div class="settings-group">
      <div class="settings-row" onclick="changePIN()" style="cursor:pointer">

        <div class="settings-label">Cambia PIN</div>
        <div class="settings-value">›</div>

function updateSetting(key,val){
  const s=STORE.get('settings',{});s[key]=val;STORE.set('settings',s);
  renderDashboard();renderAnalysis();
}

function updateBudget(catId,val){
  const b=STORE.get('budgets',{});b[catId]=val;STORE.set('budgets',b);
  renderDashboard();
}

function updateAccountBalance(id,val){
  const accounts=STORE.get('accounts',[]);
  const updated=accounts.map(a=>a.id===id?{...a,balance:val}:a);
  STORE.set('accounts',updated);
  renderDashboard();renderAnalysis();
}

function lockApp(){
  document.getElementById('app').classList.remove('visible');
  document.getElementById('lock-screen').style.display='flex';
  pinBuffer='';updateDots(0);
  const saved=localStorage.getItem('pin');
  pinPhase=saved?'enter':'create';
  document.getElementById('lock-subtitle').textContent=pinPhase==='create'?'Crea il tuo PIN':'Inserisci il PIN';
  document.getElementById('pin-error').textContent='';
}

function changePIN(){
  localStorage.removeItem('pin');
  lockApp();
}

function resetAllData(){
  ['transactions','accounts','budgets','fixed','settings'].forEach(k=>localStorage.removeItem(k));
  location.reload();
}

function exportCSV(){
  const {transactions,accounts}=getData();
  const header='Data,Tipo,Categoria,Importo,Conto,Descrizione,Note\n';
  const rows=transactions.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(t=>{
    const acc=accounts.find(a=>a.id===t.accountId);
    const cat=getCat(t.catId);
    return[new Date(t.date).toLocaleDateString('it-IT'),t.type==='expense'?'Uscita':'Entrata',
      cat.name,t.amount.toFixed(2),acc?acc.name:'-',`"${t.description||''}"`,`"${t.note||''}"`].join(',');
  }).join('\n');
  const blob=new Blob([header+rows],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='finanze_export.csv';a.click();
}

// ═══════════════════════════════════════════
// ADD TRANSACTION
// ═══════════════════════════════════════════
function openModal(){
  document.getElementById('modal-overlay').classList.add('open');
  setType('expense');
  document.getElementById('amount-input').value='';
  document.getElementById('desc-input').value='';
  document.getElementById('note-input').value='';
  buildDateInput();
  buildAccountSelect();
  document.getElementById('amount-input').focus();
}

function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}

function handleOverlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

function setType(type){
  txType=type;
  const isExp=type==='expense';
  document.getElementById('btn-expense').className='type-btn'+(isExp?' active-expense':'');
  document.getElementById('btn-income').className='type-btn'+(!isExp?' active-income':'');
  const color=isExp?'var(--coral)':'var(--mint)';
  document.getElementById('amount-prefix').style.color=color;
  document.getElementById('amount-input').style.color=color;
  document.getElementById('save-btn').style.background=isExp?'var(--coral)':'var(--mint)';
  document.getElementById('cat-group').style.display=isExp?'block':'none';
}

function selectCat(id){
  selectedCat=id;
  buildCatGrid();
}

function saveTransaction(){
  const amount=parseFloat(document.getElementById('amount-input').value.replace(',','.'));
  if(!amount||amount<=0){
    document.getElementById('amount-input').style.borderColor='var(--coral)';
    return;
  }
  const desc=document.getElementById('desc-input').value;
  const date=document.getElementById('date-input').value||new Date().toISOString().split('T')[0];
  const accountId=document.getElementById('account-select').value;
  const note=document.getElementById('note-input').value;
  const catId=txType==='expense'?selectedCat:'altro';

  const t={
    id:Date.now()+'_'+Math.random().toString(36).slice(2),
    amount,type:txType,catId,accountId,date,
    description:desc||(getCat(catId).name),
    note:note||undefined
  };

  const {transactions,accounts}=getData();
  transactions.unshift(t);
  STORE.set('transactions',transactions);

  // Update balance
  const updated=accounts.map(a=>{
    if(a.id===accountId){
      return{...a,balance:a.balance+(txType==='expense'?-amount:amount)};
    }
    return a;
  });
  STORE.set('accounts',updated);

  closeModal();
  renderDashboard();
  renderMovimenti();
  renderAnalysis();
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function switchTab(tab){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('screen-'+tab).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  currentTab=tab;
}

initPin();
